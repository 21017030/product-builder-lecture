<body>
    <nav class="navbar">
        <a href="index.html">Lotto</a>

    <div class="container animal-test-section">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <h2>동물상 테스트 (강아지 vs 고양이)</h2>
        <div class="upload-section">
            <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
            <label for="image-upload" class="upload-label">이미지 업로드</label>
        </div>
        <div id="image-container">
            <img id="face-image" src="" alt="업로드된 이미지" style="display: none; max-width: 100%; border-radius: 15px; margin-top: 20px;">
        </div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/ivBq2iSmE/";
        let model, labelContainer, maxPredictions;

        // Load the model initially
        async function loadModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                const bar = document.createElement("div");
                bar.className = 'prediction-bar';
                labelContainer.appendChild(bar);
            }
        }
        loadModel();

        async function handleImageUpload(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const imgElement = document.getElementById('face-image');
                    imgElement.src = e.target.result;
                    imgElement.style.display = 'block';
                    
                    // Wait for image to load before predicting
                    imgElement.onload = async function() {
                        await predict(imgElement);
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function predict(imgElement) {
            const prediction = await model.predict(imgElement);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
                labelContainer.childNodes[i].style.setProperty('--width', (prediction[i].probability * 100) + '%');
            }
        }
    </script>

        </div>
    </footer>
    <script src="main.js"></script>
</body>
