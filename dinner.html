<body>

    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <h1>오늘 저녁 뭐 먹지?</h1>
        <p class="description">매일 반복되는 저녁 메뉴 고민, 이제 Product Builder가 해결해 드립니다. 무작위 추천 알고리즘을 통해 엄선된 맛있는 저녁 메뉴를 제안받아 보세요.</p>
        
        <div id="menu-display" class="menu-container">
            <p id="menu-text">버튼을 눌러 메뉴를 추천받으세요!</p>
        </div>
        
        <button id="recommend-btn" class="submit-btn" style="margin-top: 20px;">메뉴 추천받기</button>
    </div>

    <footer class="footer">

            <a href="privacy.html">개인정보처리방침</a>
            <a href="about.html">서비스 소개</a>
        </div>
    </footer>

    <script>
        const menus = [
            "삼겹살에 소주", "매콤한 김치찌개", "달콤한 양념치킨", "얼큰한 짬뽕", "고소한 까르보나라",
            "신선한 초밥", "바삭한 돈가스", "뜨끈한 순대국", "매콤달콤 떡볶이", "든든한 불고기",
            "베트남 쌀국수", "태국식 팟타이", "인도 커리와 난", "멕시칸 타코", "부드러운 스테이크",
            "매운 닭발", "시원한 냉면", "짭짤한 부대찌개", "건강한 비빔밥", "고소한 곱창구이"
        ];

        document.getElementById('recommend-btn').addEventListener('click', () => {
            const menuDisplay = document.getElementById('menu-text');
            menuDisplay.classList.add('fade-out');
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * menus.length);
                menuDisplay.textContent = menus[randomIndex];
                menuDisplay.classList.remove('fade-out');
                menuDisplay.classList.add('fade-in');
            }, 300);
        });
    </script>
    <script src="main.js"></script>
