<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">Dark Mode</button>
        </div>
        <h1>Lotto Number Generator</h1>
        <div id="numbers" class="numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mojrqvkz" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="이메일 주소를 입력해주세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" required placeholder="문의하실 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" class="submit-btn">보내기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
